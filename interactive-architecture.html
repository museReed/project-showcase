<!DOCTYPE html>
<!--
  ============================================================
  muse-platform — Module Dependency Graph
  ============================================================
  Interactive layered architecture diagram showing all modules,
  their dependencies, and detail panels on click.
  ============================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>muse-platform — Module Dependency Graph</title>
<style>
  :root {
    --role-a: #4A90E2;
    --role-b: #E91E63;
    --role-c: #F57C00;
    --role-d: #9C27B0;
    --role-e: #43A047;
    --role-f: #1B5E20;
    --role-g: #546E7A;
    --mix:    #37474F;

    --highlight: #FF6B00;

    --bg:         #F4F6FA;
    --card:       #FFFFFF;
    --text:       #1A202C;
    --text-light: #4A5568;
    --border:     #E2E8F0;

    --layer-interfaces: #3182CE;
    --layer-features:   #38A169;
    --layer-platform:   #D69E2E;
    --layer-infra:      #805AD5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    padding: 36px 16px 80px;
  }
  body.embedded header { display: none; }
  body.embedded { padding-top: 16px; }
  .container { max-width: 1400px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 1.85rem; margin-bottom: 6px; }
  header .subtitle { color: var(--text-light); font-size: 0.95rem; }

  /* ===== Legend ===== */
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 18px; justify-content: center; }
  .legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.8rem; padding: 5px 12px;
    border-radius: 14px; background: var(--card);
    border: 1px solid var(--border); color: var(--text-light);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-line { width: 28px; height: 2px; border-radius: 2px; }

  /* ===== Diagram container ===== */
  .diagram-scroll {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-x: auto;
    overflow-y: auto;
    position: relative;
  }
  .diagram-inner {
    position: relative;
    min-width: 1300px;
  }

  /* ===== Detail panel ===== */
  .detail-below {
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .detail-empty {
    padding: 60px 20px; text-align: center;
    color: var(--text-light); font-size: 1rem;
  }
  .detail-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px;
    background: linear-gradient(135deg, #FAFBFC, #F0F4F8);
    border-bottom: 1px solid var(--border);
  }
  .detail-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.75rem; flex-shrink: 0;
    color: white;
  }
  .detail-header h3 { font-size: 1.1rem; line-height: 1.4; }

  .detail-3col {
    display: grid;
    grid-template-columns: 0.7fr 1.4fr 0.9fr 1fr;
    gap: 0;
  }
  @media (max-width: 1100px) { .detail-3col { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px) { .detail-3col { grid-template-columns: 1fr; } }
  .dcol {
    padding: 18px 22px;
    border-right: 1px solid var(--border);
  }
  .dcol:last-child { border-right: none; }
  @media (max-width: 900px) {
    .dcol { border-right: none; border-bottom: 1px solid var(--border); }
    .dcol:last-child { border-bottom: none; }
  }
  .dcol h4 {
    font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-light);
    margin-bottom: 12px; font-weight: 700;
  }
  .dcol.who-col h4 { color: var(--text-light); }
  .dcol.what-col h4 { color: var(--role-e); }
  .dcol.use-col h4 { color: #7C3AED; }
  .dcol.rel-col h4 { color: #B45309; }

  .layer-badge {
    display: inline-block;
    font-size: 0.74rem; padding: 3px 10px;
    border-radius: 10px; margin: 2px 4px 4px 0;
    font-weight: 600; color: white;
  }
  .boundary-badge {
    display: inline-block;
    font-size: 0.68rem; padding: 2px 8px;
    border-radius: 8px; margin: 2px 4px 4px 0;
    font-weight: 600;
    background: #FED7AA; color: #9C4221;
    border: 1px solid #FBBF24;
  }

  .subsection { margin-bottom: 14px; }
  .subsection:last-child { margin-bottom: 0; }
  .sublabel {
    font-size: 0.85rem; font-weight: 700;
    margin-bottom: 6px; padding-left: 10px;
    border-left: 3px solid var(--text-light);
  }
  .subtext {
    font-size: 0.88rem; color: var(--text-light);
    line-height: 1.65; padding-left: 13px;
  }
  .subtext ul { padding-left: 16px; margin: 4px 0; }
  .subtext li { margin-bottom: 3px; }

  .dep-link {
    display: inline-block;
    font-size: 0.82rem; padding: 2px 10px;
    border-radius: 10px; margin: 2px 3px;
    font-weight: 600; cursor: pointer;
    background: #EDF2F7; color: var(--text);
    border: 1px solid var(--border);
    transition: background 0.15s, border-color 0.15s;
  }
  .dep-link:hover {
    background: #FFF3E0;
    border-color: var(--highlight);
  }

  .dep-count {
    font-size: 0.78rem; color: var(--text-light);
    margin-top: 8px; padding-left: 13px;
  }

  /* ===== Lang switcher ===== */
  .lang-switch {
    position: absolute; top: 12px; right: 16px;
    display: flex; gap: 4px;
  }
  .lang-btn {
    font-size: 0.75rem; padding: 3px 10px;
    border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-light);
    cursor: pointer; font-weight: 600;
    transition: background 0.15s;
  }
  .lang-btn.active {
    background: var(--text); color: white;
    border-color: var(--text);
  }
</style>
</head>
<body>
<div class="container" style="position:relative;">
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">ZH</button>
  </div>

  <header>
    <h1>muse-platform — <span data-i18n="title">Module Dependency Graph</span></h1>
    <p class="subtitle" data-i18n="subtitle">Interactive architecture diagram — click any module to explore</p>
  </header>

  <div class="legend" id="legend"></div>

  <div class="diagram-scroll">
    <div class="diagram-inner" id="diagram"></div>
  </div>

  <div class="detail-below" id="detailPanel">
    <div class="detail-empty" data-i18n="click-hint">Click a module to see details</div>
  </div>
</div>

// ============================================================
// LAYOUT CONSTANTS
// ============================================================
const NODE_W = 140, NODE_H = 64, NODE_RX = 8;
const PAD_X = 40, PAD_Y = 30;
const LAYER_GAP = 20;
const LAYER_LABEL_W = 100;
const NODE_GAP_X = 16, NODE_GAP_Y = 16;

// layer order top→bottom
const LAYER_ORDER = ['interfaces', 'features', 'platform', 'infra'];

function layerColor(lid) {
  const l = LAYERS.find(x => x.id === lid);
  return l ? l.color : '#999';
}

function layerName(lid) {
  const l = LAYERS.find(x => x.id === lid);
  return l ? l[currentLang] : lid;
}

// ============================================================
// COMPUTE LAYOUT
// ============================================================
function computeLayout() {
  const groups = {};
  LAYER_ORDER.forEach(l => groups[l] = []);
  MODULES.forEach(m => groups[m.layer].push(m));

  // Determine max columns per row — features gets 2 rows if >5
  const positions = {};
  let curY = PAD_Y;
  const bandInfo = [];

  LAYER_ORDER.forEach(layerId => {
    const mods = groups[layerId];
    const maxCols = layerId === 'infra' ? 5 : layerId === 'platform' ? 4 : layerId === 'features' ? 4 : 4;
    const rows = [];
    for (let i = 0; i < mods.length; i += maxCols) {
      rows.push(mods.slice(i, i + maxCols));
    }

    const bandH = rows.length * (NODE_H + NODE_GAP_Y) + PAD_Y * 1.5;
    const bandTop = curY;

    rows.forEach((row, ri) => {
      const rowWidth = row.length * NODE_W + (row.length - 1) * NODE_GAP_X;
      row.forEach((m, ci) => {
        const x = LAYER_LABEL_W + PAD_X + ci * (NODE_W + NODE_GAP_X) + (maxCols * (NODE_W + NODE_GAP_X) - NODE_GAP_X - rowWidth) / 2;
        const y = curY + PAD_Y * 0.6 + ri * (NODE_H + NODE_GAP_Y);
        positions[m.id] = { x, y, cx: x + NODE_W / 2, cy: y + NODE_H / 2 };
      });
    });

    bandInfo.push({ layerId, top: bandTop, height: bandH });
    curY += bandH + LAYER_GAP;
  });

  // total width
  const allX = Object.values(positions).map(p => p.x + NODE_W + PAD_X);
  const totalW = Math.max(1300, Math.max(...allX) + LAYER_LABEL_W);
  const totalH = curY + 10;

  return { positions, bandInfo, totalW, totalH };
}

// ============================================================
// BUILD REVERSE DEPS
// ============================================================
function getConsumers(moduleId) {
  return MODULES.filter(m => m.deps.includes(moduleId)).map(m => m.id);
}

// RENDER
// ============================================================
let selectedModule = null;

function render() {
  const { positions, bandInfo, totalW, totalH } = computeLayout();
  const container = document.getElementById('diagram');
  container.style.width = totalW + 'px';
  container.style.height = totalH + 'px';

  // Build SVG
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" style="position:absolute;top:0;left:0;">`;

  // Layer bands (clickable)
  bandInfo.forEach(b => {
    const lc = layerColor(b.layerId);
    svg += `<rect x="0" y="${b.top}" width="${totalW}" height="${b.height}" rx="6" fill="${lc}" opacity="0.06" style="pointer-events:auto;cursor:pointer;" onclick="selectLayer('${b.layerId}')" data-layer-band="${b.layerId}"/>`;
    // Layer label
    svg += `<text x="16" y="${b.top + b.height / 2}" fill="${lc}" font-size="13" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif" dominant-baseline="central" style="pointer-events:auto;cursor:pointer;" onclick="selectLayer('${b.layerId}')" data-layer-label="${b.layerId}">${layerName(b.layerId)}</text>`;
  });

  // Layer-to-layer arrows (between adjacent bands only)
  for (let i = 0; i < bandInfo.length - 1; i++) {
    const upper = bandInfo[i];
    const lower = bandInfo[i + 1];
    const midX = totalW / 2;
    const y1 = upper.top + upper.height - 4;
    const y2 = lower.top + 4;
    const midY = (y1 + y2) / 2;
    const arrowColor = '#718096';
    // Downward arrow between layers
    svg += `<line x1="${midX}" y1="${y1}" x2="${midX}" y2="${y2}" stroke="${arrowColor}" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>`;
    // Arrowhead
    const ah = 8;
    svg += `<polygon points="${midX},${y2} ${midX-ah*0.6},${y2-ah} ${midX+ah*0.6},${y2-ah}" fill="${arrowColor}" opacity="0.35"/>`;
    // Label
    const labelText = currentLang === 'zh' ? 'imports ↓' : 'imports ↓';
    svg += `<text x="${midX + 14}" y="${midY + 4}" fill="${arrowColor}" font-size="11" font-weight="600" opacity="0.5" font-family="-apple-system,sans-serif">${labelText}</text>`;
  }

  svg += '</svg>';

  // Nodes as HTML divs
  let nodes = '';
  MODULES.forEach(m => {
    const p = positions[m.id];
    if (!p) return;
    const lc = layerColor(m.layer);
    const label = m.id.replace(/^muse_/, '').replace(/_/g, '_');
    const boundaryDot = m.boundary ? `<span style="position:absolute;top:5px;right:7px;width:8px;height:8px;border-radius:50%;background:#FFF;opacity:0.7;border:1.5px solid rgba(0,0,0,0.2);" title="Boundary Module"></span>` : '';
    nodes += `<div class="arch-node" data-id="${m.id}" onclick="selectNode('${m.id}')" style="position:absolute;left:${p.x}px;top:${p.y}px;width:${NODE_W}px;height:${NODE_H}px;border-radius:${NODE_RX}px;background:${lc};color:white;display:flex;align-items:center;justify-content:center;text-align:center;font-size:0.78rem;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.12);user-select:none;transition:transform 0.15s,box-shadow 0.15s,opacity 0.2s;line-height:1.3;padding:6px 8px;">${boundaryDot}<span>${label}</span></div>`;
  });

  container.innerHTML = svg + nodes;

  // Hover effects
  container.querySelectorAll('.arch-node').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (!el.classList.contains('selected')) {
        el.style.transform = 'translateY(-3px)';
        el.style.boxShadow = '0 6px 14px rgba(0,0,0,0.22)';
        el.style.zIndex = '5';
      }
    });
    el.addEventListener('mouseleave', () => {
      if (!el.classList.contains('selected')) {
        el.style.transform = '';
        el.style.boxShadow = '0 2px 6px rgba(0,0,0,0.12)';
        el.style.zIndex = '';
      }
    });
  });

  // Auto-select first
  if (!selectedModule) selectNode(MODULES.find(m => m.layer === 'interfaces').id);
  else selectNode(selectedModule);
}

function selectNode(id) {
  selectedModule = id;
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return;

  const container = document.getElementById('diagram');

  // Highlight selected node + related nodes (deps & consumers)
  container.querySelectorAll('.arch-node').forEach(el => {
    const eid = el.dataset.id;
    const isSelected = eid === id;
    const isRelated = mod.deps.includes(eid) || getConsumers(id).includes(eid);
    el.classList.toggle('selected', isSelected);
    if (isSelected) {
      el.style.outline = `3px solid var(--highlight)`;
      el.style.outlineOffset = '2px';
      el.style.zIndex = '6';
      el.style.opacity = '1';
      el.style.transform = '';
      el.style.boxShadow = '0 2px 6px rgba(0,0,0,0.12)';
    } else {
      el.style.outline = 'none';
      el.style.zIndex = '';
      el.style.opacity = isRelated ? '1' : '0.35';
    }
  });

  showDetail(id);
}

function showDetail(id) {
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return;
  const lc = layerColor(mod.layer);
  const data = mod[currentLang];
  const consumers = getConsumers(id);

  const depsHtml = mod.deps.length > 0
    ? mod.deps.map(d => `<span class="dep-link" onclick="selectNode('${d}')">${d.replace('muse_','')}</span>`).join(' ')
    : `<span style="color:var(--text-light);font-size:0.85rem;">${t('none')}</span>`;

  const consumersHtml = consumers.length > 0
    ? consumers.map(c => `<span class="dep-link" onclick="selectNode('${c}')">${c.replace('muse_','')}</span>`).join(' ')
    : `<span style="color:var(--text-light);font-size:0.85rem;">—</span>`;

  const boundaryHtml = mod.boundary ? `<span class="boundary-badge">${t('boundary')}</span>` : '';

  const featuresLi = data.features.map(f => `<li>${f}</li>`).join('');
  const techDetailsLi = (data.techDetails || []).map(t => `<li>${t}</li>`).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div class="detail-icon" style="background:${lc}">${mod.id.replace('muse_','').substring(0,2).toUpperCase()}</div>
      <h3>${mod.id}</h3>
    </div>
    <div class="detail-3col">
      <div class="dcol who-col">
        <h4>${t('who')}</h4>
        <div class="subsection">
          <div class="sublabel">${t('layer')}</div>
          <div class="subtext"><span class="layer-badge" style="background:${lc}">${layerName(mod.layer)}</span>${boundaryHtml}</div>
        </div>
        <div class="subsection">
          <div class="sublabel">${t('techStack')}</div>
          <div class="subtext">${mod.tech}</div>
        </div>
      </div>
      <div class="dcol what-col">
        <h4>${t('what')}</h4>
        <div class="subsection">
          <div class="sublabel">${t('role')}</div>
          <div class="subtext">${data.role}</div>
        </div>
        <div class="subsection">
          <div class="sublabel">${t('keyFeatures')}</div>
          <div class="subtext"><ul>${featuresLi}</ul></div>
        </div>
        ${techDetailsLi ? `<div class="subsection">
          <div class="sublabel">${t('techImpl')}</div>
          <div class="subtext"><ul>${techDetailsLi}</ul></div>
        </div>` : ''}
      </div>
      <div class="dcol use-col">
        <h4>${t('useCases')}</h4>
        <div class="subsection">
          <div class="sublabel">${t('scenarios')}</div>
          <div class="subtext"><ul>${(data.useCases || []).map(u => '<li>' + u + '</li>').join('')}</ul></div>
        </div>
      </div>
      <div class="dcol rel-col">
        <h4>${t('relationships')}</h4>
        <div class="subsection">
          <div class="sublabel">${t('dependsOn')}</div>
          <div class="subtext">${depsHtml}</div>
        </div>
        <div class="subsection">
          <div class="sublabel">${t('usedBy')}</div>
          <div class="subtext">${consumersHtml}</div>
        </div>
        <div class="dep-count">${mod.deps.length} ${t('depCount')} · ${consumers.length} ${t('consumerCount')}</div>
      </div>
    </div>
  `;
}

// ============================================================
// LAYER SELECTION
// ============================================================
function selectLayer(layerId) {
  selectedModule = null;
  const container = document.getElementById('diagram');

  // Highlight all modules in this layer, dim the rest
  container.querySelectorAll('.arch-node').forEach(el => {
    const mod = MODULES.find(m => m.id === el.dataset.id);
    const inLayer = mod && mod.layer === layerId;
    el.classList.remove('selected');
    el.style.outline = 'none';
    el.style.zIndex = '';
    el.style.opacity = inLayer ? '1' : '0.35';
  });

  // Highlight the layer band
  container.querySelectorAll('[data-layer-band]').forEach(rect => {
    const isTarget = rect.dataset.layerBand === layerId;
    rect.setAttribute('opacity', isTarget ? '0.14' : '0.06');
  });

  showLayerDetail(layerId);
}

function showLayerDetail(layerId) {
  const layer = LAYERS.find(l => l.id === layerId);
  if (!layer) return;
  const data = LAYER_DATA[layerId][currentLang];
  const mods = MODULES.filter(m => m.layer === layerId);
  const boundaryCount = mods.filter(m => m.boundary).length;

  const modListHtml = mods.map(m => {
    const label = m.id.replace(/^muse_/, '');
    return `<span class="dep-link" onclick="selectNode('${m.id}')">${label}</span>`;
  }).join(' ');

  const keyModulesHtml = data.keyModules.map(k => `<li>${k}</li>`).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div class="detail-icon" style="background:${layer.color}">${layer.id.substring(0,2).toUpperCase()}</div>
      <h3>${layer[currentLang]}</h3>
    </div>
    <div class="detail-3col">
      <div class="dcol who-col">
        <h4>${t('layerDesc')}</h4>
        <div class="subsection">
          <div class="subtext">${data.desc}</div>
        </div>
        <div class="subsection">
          <div class="sublabel">${t('layerDeps')}</div>
          <div class="subtext">${data.depRule}</div>
        </div>
      </div>
      <div class="dcol what-col">
        <h4>${t('layerKeyModules')}</h4>
        <div class="subsection">
          <div class="subtext"><ul>${keyModulesHtml}</ul></div>
        </div>
      </div>
      <div class="dcol rel-col">
        <h4>${t('layerModules')}</h4>
        <div class="subsection">
          <div class="subtext">${modListHtml}</div>
        </div>
        <div class="dep-count">${mods.length} ${t('layerModules')}${boundaryCount > 0 ? ` · ${boundaryCount} ${t('legendBoundary')}` : ''}</div>
      </div>
    </div>
  `;
}

// ============================================================
// LEGEND
// ============================================================
function buildLegend() {
  const legend = document.getElementById('legend');
  let html = '';
  LAYERS.forEach(l => {
    html += `<div class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${l[currentLang]}</div>`;
  });
  html += `<div class="legend-item"><span class="legend-line" style="background:var(--text-light);opacity:0.4;height:2px;border-style:dashed;"></span>${t('legendDep')}</div>`;
  html += `<div class="legend-item"><span style="width:10px;height:10px;border-radius:50%;background:#FFF;border:2px solid #CBD5E0;display:inline-block;"></span>${t('legendBoundary')}</div>`;
  legend.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================
(function init() {
  // Embedded detection
  if (window.parent !== window) document.body.classList.add('embedded');

  // Lang from URL
  const params = new URLSearchParams(window.location.search);
  const lang = params.get('lang');
  if (lang === 'zh') currentLang = 'zh';

  setLang(currentLang);
  render();
})();
</script>
</body>
</html>
