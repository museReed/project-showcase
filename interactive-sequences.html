<!DOCTYPE html>
<!--
  ============================================================
  muse-platform — Interactive Sequence Diagrams
  ============================================================
  6 Mermaid sequence diagrams covering core platform flows.
  Embedded via iframe in muse-platform-hld-viewer.html
  ("Interactive Flows" tab). Supports ?lang=en|zh.
  ============================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>muse-platform — Interactive Sequence Diagrams</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg:         #F4F6FA;
    --card:       #FFFFFF;
    --text:       #1A202C;
    --text-light: #4A5568;
    --border:     #E2E8F0;
    --accent:     #4A90E2;
    --accent-hover: #357ABD;
    --accent-bg:  #EBF4FF;
    --sidebar-w:  260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Hide header when embedded in iframe */
  body.embedded header { display: none; }
  body.embedded { padding-top: 0; }

  header {
    text-align: center;
    padding: 28px 16px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.65rem; margin-bottom: 6px; }
  header .subtitle { color: var(--text-light); font-size: 0.9rem; }

  /* ===== Layout: sidebar + main ===== */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
    flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-light);
    font-weight: 700;
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .sidebar-btn {
    display: block;
    width: 100%;
    text-align: left;
    border: none;
    background: transparent;
    padding: 10px 16px;
    font-size: 0.88rem;
    line-height: 1.4;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: inherit;
    border-left: 3px solid transparent;
  }
  .sidebar-btn:hover {
    background: var(--accent-bg);
  }
  .sidebar-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
    border-left-color: var(--accent);
  }
  .sidebar-btn .btn-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-light);
    font-size: 0.72rem;
    font-weight: 700;
    margin-right: 8px;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .sidebar-btn.active .btn-num {
    background: var(--accent);
    color: white;
  }

  /* ===== Main content area ===== */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px 60px;
    min-width: 0;
  }

  .diagram-title {
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .diagram-desc {
    color: var(--text-light);
    font-size: 0.92rem;
    line-height: 1.7;
    margin-bottom: 24px;
    max-width: 800px;
  }

  /* ===== Mermaid container ===== */
  .mermaid-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 24px;
  }
  .mermaid-wrap svg {
    max-width: none;
    display: block;
    margin: 0 auto;
  }
  .mermaid-wrap .loading-text {
    text-align: center;
    color: var(--text-light);
    padding: 40px;
    font-size: 0.9rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 860px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
      gap: 0;
    }
    .sidebar-label { display: none; }
    .sidebar-btn {
      white-space: nowrap;
      padding: 10px 14px;
      border-left: none;
      border-bottom: 3px solid transparent;
      font-size: 0.82rem;
    }
    .sidebar-btn.active {
      border-left-color: transparent;
      border-bottom-color: var(--accent);
    }
    .main { padding: 20px 16px 40px; }
  }

  footer {
    padding: 16px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-light);
    font-size: 0.8rem;
    background: var(--card);
  }
  footer code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-size: 0.78rem;
  }
</style>
</head>
<body>

<header>
  <h1 data-en="muse-platform &mdash; Sequence Diagrams" data-zh="muse-platform &mdash; 時序圖集">muse-platform &mdash; Sequence Diagrams</h1>
  <p class="subtitle" data-en="6 core flows visualized as interactive sequence diagrams" data-zh="6 個核心流程的互動式時序圖">6 core flows visualized as interactive sequence diagrams</p>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label" data-en="DIAGRAMS" data-zh="圖表">DIAGRAMS</div>
  </nav>

  <div class="main" id="main">
    <h2 class="diagram-title" id="diagram-title"></h2>
    <p class="diagram-desc" id="diagram-desc"></p>
    <div class="mermaid-wrap" id="mermaid-wrap">
      <div class="loading-text" data-en="Loading diagram..." data-zh="載入圖表中...">Loading diagram...</div>
    </div>
  </div>
</div>

<footer>
  <span data-en="Source: muse-platform HLD &mdash; Interactive Sequence Flows" data-zh="來源：muse-platform HLD &mdash; 互動式時序流程">Source: muse-platform HLD &mdash; Interactive Sequence Flows</span>
</footer>

<script>
// ===== i18n =====
const LANG = new URLSearchParams(window.location.search).get('lang') || 'en';

function applyLang(lang) {
  document.querySelectorAll('[data-' + lang + ']').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + lang);
  });
}

// ===== Diagram Data =====
const DIAGRAMS = [
  {
    id: 'collector-pipeline',
    title: { en: '1. Collector Pipeline', zh: '1. Collector Pipeline（通用流程）' },
    desc: {
      en: '8-phase pipeline: Collect \u2192 Normalize \u2192 Store \u2192 Score \u2192 Classify (LLM) \u2192 Enrich (LLM) \u2192 Expert Review (parallel LLM) \u2192 Notify. Each collector (AI News, XHS, YouTube, Twitter) follows this pattern.',
      zh: '8 階段 pipeline：收集 \u2192 正規化 \u2192 儲存 \u2192 評分 \u2192 分類（LLM）\u2192 充實（LLM）\u2192 專家審查（並行 LLM）\u2192 通知。每個 collector 都遵循此模式。'
    },
    btnLabel: { en: 'Collector Pipeline', zh: 'Collector Pipeline' },
    mermaid: `sequenceDiagram
  participant S as Scheduler (cron)
  participant C as Collector (Feature)
  participant Src as External Source
  participant DB as SQLite DB
  participant LLM as muse_llm (Platform)
  participant N as muse_notify (Platform)

  S->>C: trigger job

  Note over C: allocate correlation_id

  rect rgb(30, 45, 80)
    Note over C,Src: Phase 1 — Collect
    C->>Src: fetch raw data (paginated)
    Src-->>C: raw items
  end

  rect rgb(30, 45, 80)
    Note over C: Phase 2 — Normalize
    C->>C: deduplicate (SHA256 content_hash)
    C->>C: parse JSON fields
  end

  rect rgb(30, 45, 80)
    Note over C,DB: Phase 3 — Store
    C->>DB: INSERT / UPDATE posts
  end

  rect rgb(30, 45, 80)
    Note over C,DB: Phase 4 — Score (5 dimensions)
    C->>C: compute ai_value / muse_value / career / project / social
    C->>DB: UPDATE post_metadata
  end

  rect rgb(40, 55, 90)
    Note over C,LLM: Phase 5 — Classify (LLM)
    C->>LLM: call(prompt, task="classify_*")
    LLM-->>C: category, impact, time_sensitivity
    C->>DB: UPDATE post_metadata
  end

  rect rgb(40, 55, 90)
    Note over C,LLM: Phase 6 — Enrich (LLM)
    C->>LLM: call(prompt, task="enrich_*")
    LLM-->>C: llm_summary, personal_insights
    C->>DB: INSERT post_enrichment
  end

  rect rgb(50, 65, 100)
    Note over C,LLM: Phase 7 — Expert Review (parallel LLM)
    par TECH_LANDSCAPE (score > 0.7)
      C->>LLM: call(task="expert_*")
    and SYSTEM_INTEGRATION (score > 0.5)
      C->>LLM: call(task="expert_*")
    and CAREER_GROWTH (score > 0.3)
      C->>LLM: call(task="expert_*")
    and CREDIBILITY_CHECK (all)
      C->>LLM: call(task="expert_*")
    end
    LLM-->>C: expert_review (JSON)
    C->>DB: UPDATE post_enrichment
  end

  rect rgb(30, 45, 80)
    Note over C,N: Phase 8 — Notify
    C->>N: send_telegram(digest)
  end

  Note over C: write pipeline log (JSONL)<br/>update _latest.jsonl symlink`
  },
  {
    id: 'llm-routing',
    title: { en: '2. LLM Task-Based Routing', zh: '2. LLM 基於任務的路由' },
    desc: {
      en: 'Task-based routing with automatic fallback. Each LLM call specifies a task name, resolved to provider/model/fallback via routing_config.toml. Rate limit triggers fallback to secondary provider.',
      zh: '基於任務的路由與自動降級。每個 LLM 呼叫指定任務名稱，透過 routing_config.toml 解析為 provider/model/fallback。觸發 rate limit 時自動切換至備用 provider。'
    },
    btnLabel: { en: 'LLM Routing', zh: 'LLM 路由' },
    mermaid: `sequenceDiagram
  participant F as Feature (Caller)
  participant LC as LLMClient
  participant RC as Routing Config<br/>(routing_config.toml)
  participant AF as Adapter Factory
  participant P1 as Primary Provider<br/>(e.g. Claude)
  participant P2 as Fallback Provider<br/>(e.g. DeepSeek)

  F->>LC: call(prompt, task="enrich_ai_news")

  LC->>RC: resolve task route
  RC-->>LC: TaskRoute(provider="claude-cli",<br/>model="haiku-4-5",<br/>fallback="deepseek")

  LC->>AF: create_adapter(task)
  AF-->>LC: CliLLMAdapter

  LC->>P1: adapter.call(prompt)

  alt SUCCESS
    P1-->>LC: LLMResult(text, tokens, cost)
    LC-->>F: result
  else RATE LIMIT
    P1-->>LC: 429 Rate Limit
    LC->>AF: create_fallback_adapter(task)
    AF-->>LC: DeepSeekAdapter
    LC->>P2: fallback.call(prompt)
    P2-->>LC: LLMResult(text, tokens, cost)
    LC-->>F: result (via fallback)
  end`
  },
  {
    id: 'mcp-search',
    title: { en: '3. MCP Knowledge Server', zh: '3. MCP 知識伺服器' },
    desc: {
      en: 'MCP server enables Claude Desktop/Code to search across 4 isolated SQLite databases via FTS5 full-text search with CJK fallback, merged and sorted by relevance score.',
      zh: 'MCP server 讓 Claude Desktop/Code 能跨 4 個獨立 SQLite 資料庫進行 FTS5 全文搜尋（含 CJK fallback），合併後依相關性分數排序。'
    },
    btnLabel: { en: 'MCP Knowledge Search', zh: 'MCP 知識搜尋' },
    mermaid: `sequenceDiagram
  participant U as Claude Desktop /<br/>Claude Code
  participant MCP as MCP Server<br/>(stdio transport)
  participant KS as KnowledgeSearch<br/>Engine
  participant DB1 as ai-news.db
  participant DB2 as xhs.db
  participant DB3 as videos.db
  participant DB4 as tweets.db

  U->>MCP: search_articles(query="RAG",<br/>min_score=0.5, days=30)
  MCP->>KS: search(query, sources, filters)

  par Query each source DB
    KS->>DB1: FTS5 MATCH "RAG"<br/>JOIN articles + enrichment
    DB1-->>KS: results_1
  and
    KS->>DB2: FTS5 MATCH "RAG"<br/>fallback LIKE for CJK
    DB2-->>KS: results_2
  and
    KS->>DB3: FTS5 MATCH "RAG"
    DB3-->>KS: results_3
  and
    KS->>DB4: FTS5 MATCH "RAG"
    DB4-->>KS: results_4
  end

  KS->>KS: merge all results
  KS->>KS: sort by ai_value_score DESC
  KS->>KS: apply limit

  KS-->>MCP: merged results (JSON)
  MCP-->>U: articles with enrichment`
  },
  {
    id: 'telegram-agent',
    title: { en: '4. Telegram AI Agent', zh: '4. Telegram AI Agent' },
    desc: {
      en: 'Multi-turn conversational AI agent with tool approval gate. Sessions have 30min TTL, max 3 concurrent. Tool calls require explicit user approval via Telegram inline keyboard.',
      zh: '多輪對話 AI agent，附帶工具審批閘門。Session 有 30 分鐘 TTL，最多 3 個並行。工具呼叫需透過 Telegram inline keyboard 取得用戶明確同意。'
    },
    btnLabel: { en: 'Telegram AI Agent', zh: 'Telegram AI Agent' },
    mermaid: `sequenceDiagram
  participant U as User (Telegram)
  participant TB as Telegram Bridge
  participant SM as Session Manager
  participant AS as Agent Session
  participant LLM as muse_llm
  participant TG as ToolGate Registry

  U->>TB: send message

  TB->>SM: get_or_create_session(user_id)
  SM-->>TB: session (max 3 concurrent, 30min TTL)

  TB->>AS: route message

  AS->>LLM: call(prompt, task="telegram_interactive",<br/>temperature=0.7)
  LLM-->>AS: response

  alt tool_use detected
    AS->>TG: request approval
    TG->>U: send inline keyboard<br/>[Approve] [Deny]
    U->>TG: button callback
    alt Approved
      TG->>AS: execute tool
      AS->>LLM: continue with tool result
      LLM-->>AS: final response
    else Denied
      TG->>AS: skip tool
    end
  end

  AS-->>TB: response text
  TB-->>U: send message<br/>(chunk if > 4096 chars)`
  },
  {
    id: 'ops-server',
    title: { en: '5. Ops Server — Catalog-Driven Auto-Mount', zh: '5. Ops Server — Catalog 驅動自動掛載' },
    desc: {
      en: 'At startup, Ops Server scans all muse.toml manifests, auto-imports routers and mounts them. Runtime: Next.js UI queries feature cards and triggers actions via catalog-driven endpoints.',
      zh: '啟動時 Ops Server 掃描所有 muse.toml manifest，自動 import router 並掛載。執行期：Next.js UI 查詢 feature cards 並透過 catalog-driven endpoints 觸發 actions。'
    },
    btnLabel: { en: 'Ops Server Auto-Mount', zh: 'Ops Server 自動掛載' },
    mermaid: `sequenceDiagram
  participant UI as Ops UI (Next.js)
  participant OS as Ops Server (FastAPI)
  participant Cat as muse_catalog
  participant FM as Feature Modules

  rect rgb(30, 45, 80)
    Note over OS,FM: Startup Phase
    OS->>Cat: load_catalog()
    Cat->>Cat: scan all muse.toml files
    Cat-->>OS: ModuleManifest[]

    loop for each module with [router]
      OS->>FM: importlib.import_module(router_path)
      FM-->>OS: FastAPI Router
      OS->>OS: app.mount(mount_path, router)
    end

    loop for each module with [ops_ui]
      OS->>OS: register actions + card definitions
    end
  end

  rect rgb(40, 55, 90)
    Note over UI,FM: Runtime Phase
    UI->>OS: GET /api/features
    OS-->>UI: feature cards (title, actions, status)

    UI->>OS: POST /api/actions/{feature}/{action}
    OS->>FM: importlib → import handler
    OS->>FM: handler()
    FM-->>OS: result
    OS-->>UI: execution response
  end`
  },
  {
    id: 'ab-test',
    title: { en: '6. A/B Test Pipeline (LLM Cost Optimization)', zh: '6. A/B 測試 Pipeline（LLM 成本優化）' },
    desc: {
      en: '3-phase experiment pipeline: Run paired LLM calls \u2192 Judge quality with Opus \u2192 Generate cost/quality summary. Used to optimize routing_config.toml task\u2192provider mapping.',
      zh: '3 階段實驗 pipeline：執行配對 LLM 呼叫 \u2192 用 Opus 評審品質 \u2192 產出成本/品質摘要。用於最佳化 routing_config.toml 的 task\u2192provider 映射。'
    },
    btnLabel: { en: 'A/B Test Pipeline', zh: 'A/B 測試 Pipeline' },
    mermaid: `sequenceDiagram
  participant Op as Operator (Reed)
  participant AB as AB Test Script
  participant DB as Experiment DB
  participant PA as Provider A (Claude)
  participant PB as Provider B (DeepSeek)
  participant Judge as LLM Judge (Opus)

  rect rgb(30, 45, 80)
    Note over Op,PB: Phase 1 — Run Experiment
    Op->>AB: run --group baseline --limit 60
    AB->>DB: load 60 articles from SQLite

    loop for each article
      AB->>PA: classify (Claude Sonnet)
      PA-->>AB: result_A + cost_A
      AB->>PB: classify (DeepSeek Chat)
      PB-->>AB: result_B + cost_B
      AB->>DB: store results + costs
    end
  end

  rect rgb(40, 55, 90)
    Note over Op,Judge: Phase 2 — Judge Quality
    Op->>AB: judge --node enrich
    loop for each result pair
      AB->>Judge: compare quality (Claude Opus)
      Judge-->>AB: quality scores
      AB->>DB: store judgments
    end
  end

  rect rgb(50, 65, 100)
    Note over Op,AB: Phase 3 — Summary & Apply
    Op->>AB: summary
    AB->>DB: aggregate latency, cost, quality per group
    AB-->>Op: report: "DeepSeek 83% cheaper,<br/>same quality for classify"

    Op->>Op: UPDATE routing_config.toml<br/>task → provider mapping
  end`
  }
];

// ===== Mermaid Init =====
mermaid.initialize({
  startOnLoad: false,
  theme: 'default',
  securityLevel: 'loose',
  sequence: {
    diagramMarginX: 16,
    diagramMarginY: 16,
    actorMargin: 60,
    width: 180,
    height: 50,
    boxMargin: 8,
    boxTextMargin: 6,
    noteMargin: 12,
    messageMargin: 40,
    mirrorActors: true,
    useMaxWidth: false
  }
});

// ===== State =====
let currentIdx = 0;
let renderCounter = 0;

// ===== Sidebar =====
const sidebarEl = document.getElementById('sidebar');

DIAGRAMS.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'sidebar-btn' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `<span class="btn-num">${i + 1}</span><span class="btn-label" data-en="${d.btnLabel.en}" data-zh="${d.btnLabel.zh}">${d.btnLabel[LANG]}</span>`;
  btn.addEventListener('click', () => selectDiagram(i));
  sidebarEl.appendChild(btn);
});

// ===== Rendering =====
const titleEl = document.getElementById('diagram-title');
const descEl = document.getElementById('diagram-desc');
const wrapEl = document.getElementById('mermaid-wrap');

async function selectDiagram(idx) {
  currentIdx = idx;

  // Update sidebar active state
  sidebarEl.querySelectorAll('.sidebar-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  const d = DIAGRAMS[idx];
  titleEl.textContent = d.title[LANG];
  descEl.textContent = d.desc[LANG];

  // Show loading
  wrapEl.innerHTML = `<div class="loading-text">${LANG === 'zh' ? '載入圖表中...' : 'Rendering diagram...'}</div>`;

  // Render mermaid
  try {
    renderCounter++;
    const renderId = 'mermaid-diagram-' + renderCounter;
    const { svg } = await mermaid.render(renderId, d.mermaid);
    // Only update if user hasn't switched to a different diagram
    if (currentIdx === idx) {
      wrapEl.innerHTML = svg;
    }
  } catch (err) {
    console.error('Mermaid render error:', err);
    wrapEl.innerHTML = `<div class="loading-text" style="color:#D32F2F;">Error rendering diagram. Check console for details.</div>`;
  }
}

// ===== Init =====
function init() {
  // Detect embedded mode
  try {
    if (window.self !== window.top) {
      document.body.classList.add('embedded');
    }
  } catch (e) {
    // Cross-origin iframe — treat as embedded
    document.body.classList.add('embedded');
  }

  // Also check for ?embedded query param
  if (new URLSearchParams(window.location.search).has('embedded')) {
    document.body.classList.add('embedded');
  }

  applyLang(LANG);

  // Load first diagram
  selectDiagram(0);
}

init();
</script>
</body>
</html>
