<!DOCTYPE html>
<!--
  ============================================================
  Contract-Driven AI Development — Hybrid Methodology
  ============================================================
  6 Mermaid diagrams: 1 overview flowchart + 5 phase sequence
  diagrams illustrating the hybrid OpenNet + AI×BDD methodology.
  Supports ?lang=en|zh and iframe embedded mode.
  ============================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contract-Driven AI Development — Hybrid Methodology</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg:         #F4F6FA;
    --card:       #FFFFFF;
    --text:       #1A202C;
    --text-light: #4A5568;
    --border:     #E2E8F0;
    --accent:     #4A90E2;
    --accent-hover: #357ABD;
    --accent-bg:  #EBF4FF;
    --sidebar-w:  260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Hide header when embedded in iframe */
  body.embedded header { display: none; }
  body.embedded { padding-top: 0; }

  header {
    text-align: center;
    padding: 28px 16px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.65rem; margin-bottom: 6px; }
  header .subtitle { color: var(--text-light); font-size: 0.9rem; }

  /* ===== Layout: sidebar + main ===== */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
    flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-light);
    font-weight: 700;
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .sidebar-btn {
    display: block;
    width: 100%;
    text-align: left;
    border: none;
    background: transparent;
    padding: 10px 16px;
    font-size: 0.88rem;
    line-height: 1.4;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: inherit;
    border-left: 3px solid transparent;
  }
  .sidebar-btn:hover {
    background: var(--accent-bg);
  }
  .sidebar-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
    border-left-color: var(--accent);
  }
  .sidebar-btn .btn-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-light);
    font-size: 0.72rem;
    font-weight: 700;
    margin-right: 8px;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .sidebar-btn.active .btn-num {
    background: var(--accent);
    color: white;
  }

  /* ===== Main content area ===== */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px 60px;
    min-width: 0;
  }

  .diagram-title {
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .diagram-desc {
    color: var(--text-light);
    font-size: 0.92rem;
    line-height: 1.7;
    margin-bottom: 24px;
    max-width: 800px;
  }

  /* ===== Mermaid container ===== */
  .mermaid-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 24px;
  }
  .mermaid-wrap svg {
    max-width: none;
    display: block;
    margin: 0 auto;
  }
  .mermaid-wrap .loading-text {
    text-align: center;
    color: var(--text-light);
    padding: 40px;
    font-size: 0.9rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 860px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
      gap: 0;
    }
    .sidebar-label { display: none; }
    .sidebar-btn {
      white-space: nowrap;
      padding: 10px 14px;
      border-left: none;
      border-bottom: 3px solid transparent;
      font-size: 0.82rem;
    }
    .sidebar-btn.active {
      border-left-color: transparent;
      border-bottom-color: var(--accent);
    }
    .main { padding: 20px 16px 40px; }
  }

  footer {
    padding: 16px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-light);
    font-size: 0.8rem;
    background: var(--card);
  }
  footer code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-size: 0.78rem;
  }
</style>
</head>
<body>

<header>
  <h1 data-en="Contract-Driven AI Development &mdash; Hybrid Methodology" data-zh="契約驅動 AI 開發 &mdash; 混合方法論">Contract-Driven AI Development &mdash; Hybrid Methodology</h1>
  <p class="subtitle" data-en="5-phase hybrid combining OpenNet TDD + AI&times;BDD specification spectrum" data-zh="融合 OpenNet TDD 與 AI&times;BDD 規格光譜的 5 階段混合方法論">5-phase hybrid combining OpenNet TDD + AI&times;BDD specification spectrum</p>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label" data-en="DIAGRAMS" data-zh="圖表">DIAGRAMS</div>
  </nav>

  <div class="main" id="main">
    <h2 class="diagram-title" id="diagram-title"></h2>
    <p class="diagram-desc" id="diagram-desc"></p>
    <div class="mermaid-wrap" id="mermaid-wrap">
      <div class="loading-text" data-en="Loading diagram..." data-zh="載入圖表中...">Loading diagram...</div>
    </div>
  </div>
</div>

<footer>
  <span data-en="Contract-Driven AI Development &mdash; OpenNet &times; AI&times;BDD Hybrid Methodology" data-zh="契約驅動 AI 開發 &mdash; OpenNet &times; AI&times;BDD 混合方法論">Contract-Driven AI Development &mdash; OpenNet &times; AI&times;BDD Hybrid Methodology</span>
</footer>

<script>
// ===== i18n =====
const LANG = new URLSearchParams(window.location.search).get('lang') || 'en';

function applyLang(lang) {
  document.querySelectorAll('[data-' + lang + ']').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + lang);
  });
}

// ===== Diagram Data =====
const DIAGRAMS = [
  {
    id: 'overview',
    title: {
      en: 'Overview: 5-Phase Contract-Driven AI Development',
      zh: '總覽：5 階段契約驅動 AI 開發流程'
    },
    desc: {
      en: 'End-to-end flow combining OpenNet TDD methodology (12-chapter executable contracts, adapter mechanism, 4-layer tracking) with AI\u00d7BDD specification spectrum (Discovery \u2192 Formulation \u2192 Automation, structured BDD analysis, auto feedback loop). Each phase feeds into the next, with iteration loops between Phase 3 verification and Phase 2 implementation.',
      zh: '端到端流程，融合 OpenNet TDD 方法論（12 章可執行契約、Adapter 機制、4 層追蹤）與 AI\u00d7BDD 規格光譜（Discovery \u2192 Formulation \u2192 Automation、結構化 BDD 分析、自動回饋迴圈）。各階段依序銜接，Phase 3 驗證與 Phase 2 實作之間設有迭代迴圈。'
    },
    btnLabel: { en: 'Overview', zh: '總覽' },
    mermaid: `flowchart TB
  subgraph INPUTS["Source Methodologies"]
    direction LR
    ON["OpenNet TDD<br/>12-Chapter Executable Contracts<br/>Adapter Mechanism<br/>4-Layer Tracking"]
    BDD["AI x BDD<br/>Specification Spectrum<br/>BDD Analysis<br/>Auto Feedback Loop"]
  end

  subgraph P0["Phase 0 — Discovery"]
    direction LR
    P0A["Event Storming"]
    P0B["Specification Spectrum<br/>Analysis"]
    P0C["BDD Analysis"]
    P0D[/"Domain Concepts +<br/>Boundary Scenarios"/]
    P0A --> P0B --> P0C --> P0D
  end

  subgraph P1["Phase 1 — TDD Contract Generation"]
    direction LR
    P1A["TDD Chapters<br/>Ch01 + Ch05 + Ch10"]
    P1B["Edge Case Injection<br/>from BDD Analysis"]
    P1C["Context Engineering<br/>.mdc Rule Files"]
    P1D[/"Test Suite as<br/>Executable Contract<br/>+ .mdc Rules"/]
    P1A --> P1B --> P1C --> P1D
  end

  subgraph P2["Phase 2 — Implementation"]
    direction LR
    P2A["AI Coding against<br/>TDD Contract"]
    P2B["Adapter Mechanism<br/>Clean Architecture"]
    P2C["Context Window<br/>Management"]
    P2D[/"Implementation<br/>Passing All Tests"/]
    P2A --> P2B --> P2C --> P2D
  end

  subgraph P3["Phase 3 — Verification"]
    direction LR
    P3A["Auto Feedback Loop<br/>Test vs Impl"]
    P3B["TDD Consistency<br/>Check"]
    P3C["Selective Gherkin<br/>Boundary Cases"]
    P3D[/"Green Build +<br/>Consistency Report"/]
    P3A --> P3B --> P3C --> P3D
  end

  subgraph P4["Phase 4 — Tracking & Iteration"]
    direction LR
    P4A["Daily Log +<br/>Changelog"]
    P4B["AI Record<br/>LLM Decision Audit"]
    P4C["Amendment Log<br/>Spec Evolution"]
    P4D[/"Complete Audit<br/>Trail"/]
    P4A --> P4B --> P4C --> P4D
  end

  ON --> P0
  BDD --> P0
  P0 --> P1
  P1 --> P2
  P2 --> P3
  P3 -->|"Fail: iterate"| P2
  P3 -->|"Pass"| P4
  P4 -->|"New requirements"| P0

  style INPUTS fill:#1e3a5f,stroke:#4A90E2,color:#fff
  style P0 fill:#1a3352,stroke:#4A90E2,color:#fff
  style P1 fill:#1e3a5f,stroke:#4A90E2,color:#fff
  style P2 fill:#223f66,stroke:#4A90E2,color:#fff
  style P3 fill:#26446d,stroke:#4A90E2,color:#fff
  style P4 fill:#2a4a74,stroke:#4A90E2,color:#fff`
  },
  {
    id: 'phase-0',
    title: {
      en: 'Phase 0 — Discovery (from AI\u00d7BDD)',
      zh: 'Phase 0 — 探索階段（源自 AI\u00d7BDD）'
    },
    desc: {
      en: 'Event Storming surfaces domain concepts. The Specification Spectrum (Discovery \u2192 Formulation \u2192 Automation) structures requirements progressively. BDD Analysis applies the structured process to decompose complex boundaries into precise Given-When-Then scenarios. Output: domain concepts + boundary scenarios ready for contract generation.',
      zh: 'Event Storming 發掘領域概念。規格光譜（Discovery \u2192 Formulation \u2192 Automation）漸進式結構化需求。BDD 分析「詞入格組寫」將複雜邊界拆解為精確的 Given-When-Then 場景。產出：領域概念 + 邊界場景，備妥進入契約生成。'
    },
    btnLabel: { en: 'Phase 0: Discovery', zh: 'Phase 0: 探索' },
    mermaid: `sequenceDiagram
  participant PO as Product Owner
  participant AI as AI Assistant
  participant DM as Domain Model
  participant EB as Event Board

  rect rgb(30, 45, 80)
    Note over PO,EB: Step 1 — Event Storming
    PO->>EB: Post domain events on board
    PO->>EB: Identify commands + aggregates
    AI->>EB: Suggest missing events from patterns
    EB-->>DM: Extracted domain concepts
  end

  rect rgb(35, 50, 85)
    Note over PO,DM: Step 2 — Specification Spectrum Analysis
    AI->>PO: Which features need formal spec?
    PO->>AI: Feature priority + complexity matrix

    Note over AI: Discovery: brainstorm user stories
    AI->>DM: Map stories to domain entities

    Note over AI: Formulation: structure as rules
    AI->>DM: Convert stories to business rules
    DM-->>AI: Rule set with domain terms
  end

  rect rgb(40, 55, 90)
    Note over PO,DM: Step 3 — BDD Analysis for Complex Boundaries
    AI->>PO: Identify high-complexity boundaries
    PO-->>AI: Boundary case candidates

    Note over AI: Apply structured BDD analysis
    AI->>AI: Extract keywords from rules
    AI->>AI: Map keywords to Given-When-Then slots
    AI->>AI: Group related scenarios
    AI->>AI: Compose scenario outlines
    AI->>DM: Boundary scenarios (Given-When-Then)
  end

  rect rgb(45, 60, 95)
    Note over AI,DM: Output Assembly
    AI->>DM: Compile domain concept catalog
    AI->>DM: Attach boundary scenario set
    DM-->>PO: Review: domain concepts + boundary scenarios
    PO-->>DM: Approved discovery artifacts
  end

  Note over PO,EB: Output: Domain concepts + boundary scenarios`
  },
  {
    id: 'phase-1',
    title: {
      en: 'Phase 1 — TDD Contract Generation (OpenNet Enhanced)',
      zh: 'Phase 1 — TDD 契約生成（OpenNet 增強版）'
    },
    desc: {
      en: 'Leverages OpenNet TDD chapters: Ch01 (Foundation setup), Ch05 (Architecture with adapters), Ch10 (Comprehensive testing). Edge cases from Phase 0 BDD analysis are injected into the test suite. Context Engineering generates .mdc rule files for AI context management. Output: executable test contract + .mdc rules.',
      zh: '運用 OpenNet TDD 章節：Ch01（基礎建置）、Ch05（含 Adapter 之架構）、Ch10（完整測試）。Phase 0 BDD 分析產出的邊界案例注入測試套件。Context Engineering 產生 .mdc 規則檔管理 AI 上下文。產出：可執行測試契約 + .mdc 規則。'
    },
    btnLabel: { en: 'Phase 1: Contract Gen', zh: 'Phase 1: 契約生成' },
    mermaid: `sequenceDiagram
  participant AI as AI Assistant
  participant TDD as TDD Framework
  participant CE as Context Engine
  participant RF as Rule Files (.mdc)

  rect rgb(30, 45, 80)
    Note over AI,TDD: Step 1 — TDD Chapter Selection
    AI->>TDD: Load Ch01 Foundation template
    TDD-->>AI: Project scaffold + base test structure
    AI->>TDD: Load Ch05 Architecture template
    TDD-->>AI: Adapter interfaces + port definitions
    AI->>TDD: Load Ch10 Testing template
    TDD-->>AI: Test patterns + coverage targets
  end

  rect rgb(35, 50, 85)
    Note over AI,TDD: Step 2 — Edge Case Injection from BDD
    AI->>AI: Load Phase 0 boundary scenarios
    AI->>TDD: Convert Given-When-Then to test cases
    TDD-->>AI: Enhanced test suite with boundary tests

    loop For each boundary scenario
      AI->>TDD: Generate parameterized test
      AI->>TDD: Add error path assertions
      AI->>TDD: Add adapter contract test
    end
  end

  rect rgb(40, 55, 90)
    Note over AI,RF: Step 3 — Context Engineering
    AI->>CE: Analyze domain + test contracts
    CE-->>AI: Context map: 9 rule categories

    AI->>RF: Generate project-rules.mdc
    AI->>RF: Generate architecture-rules.mdc
    AI->>RF: Generate testing-rules.mdc
    AI->>RF: Generate adapter-rules.mdc
    AI->>RF: Generate domain-rules.mdc
    AI->>RF: Generate boundary-rules.mdc
    AI->>RF: Generate coding-style.mdc
    AI->>RF: Generate error-handling.mdc
    AI->>RF: Generate documentation.mdc
  end

  rect rgb(45, 60, 95)
    Note over AI,RF: Output Assembly
    AI->>TDD: Validate all tests fail (RED state)
    TDD-->>AI: Confirmed: all tests RED
    AI->>RF: Validate .mdc files parseable
    RF-->>AI: Confirmed: 9 rule files ready
  end

  Note over AI,RF: Output: Test suite as executable contract + .mdc rules`
  },
  {
    id: 'phase-2',
    title: {
      en: 'Phase 2 — Implementation (OpenNet)',
      zh: 'Phase 2 — 實作階段（OpenNet）'
    },
    desc: {
      en: 'AI coder implements against the TDD contract. The adapter mechanism ensures clean architecture boundaries — business logic never depends on infrastructure directly. Context window is managed via .mdc rule files loaded per task. Output: implementation passing all tests.',
      zh: 'AI coder 依 TDD 契約實作。Adapter 機制確保乾淨的架構邊界 — 業務邏輯不直接依賴基礎設施。透過按任務載入 .mdc 規則檔管理上下文窗口。產出：通過所有測試的實作。'
    },
    btnLabel: { en: 'Phase 2: Implementation', zh: 'Phase 2: 實作' },
    mermaid: `sequenceDiagram
  participant AC as AI Coder
  participant TS as Test Suite<br/>(Executable Contract)
  participant AL as Adapter Layer
  participant SC as Source Code

  rect rgb(30, 45, 80)
    Note over AC,SC: Step 1 — Context Loading
    AC->>AC: Load .mdc rule files into context
    AC->>TS: Read test contract (RED tests)
    TS-->>AC: Test expectations + interfaces
    AC->>AC: Plan implementation order
  end

  rect rgb(35, 50, 85)
    Note over AC,SC: Step 2 — Domain Core Implementation
    loop For each domain module
      AC->>SC: Implement domain entity / value object
      AC->>TS: Run domain unit tests
      TS-->>AC: Test results (RED to GREEN)
      AC->>SC: Refactor if needed
    end
  end

  rect rgb(40, 55, 90)
    Note over AC,AL: Step 3 — Adapter Implementation
    AC->>AL: Define port interfaces
    AC->>AL: Implement primary adapters (API/CLI)
    AC->>AL: Implement secondary adapters (DB/External)
    AC->>TS: Run adapter contract tests
    TS-->>AC: Adapter tests GREEN

    Note over AC,AL: Architecture portability ensured:<br/>swap adapters without changing domain
  end

  rect rgb(45, 60, 95)
    Note over AC,SC: Step 4 — Integration Assembly
    AC->>SC: Wire adapters to domain via DI
    AC->>TS: Run full test suite
    TS-->>AC: Integration tests GREEN

    alt Some tests still RED
      AC->>AC: Reload relevant .mdc rules
      AC->>SC: Fix implementation
      AC->>TS: Re-run failing tests
      TS-->>AC: All tests GREEN
    end
  end

  Note over AC,SC: Output: Implementation passing all tests`
  },
  {
    id: 'phase-3',
    title: {
      en: 'Phase 3 — Verification (Hybrid)',
      zh: 'Phase 3 — 驗證階段（混合）'
    },
    desc: {
      en: 'Combines AI\u00d7BDD Auto Feedback Loop (automatic test-implementation consistency checking) with OpenNet TDD Consistency Check (ensure no test drift from original contract). High-complexity boundary cases get selective Gherkin formal verification. Output: verified green build + consistency report.',
      zh: '結合 AI\u00d7BDD 自動回饋迴圈（自動檢查測試與實作一致性）與 OpenNet TDD 一致性檢查（確保測試未偏離原始契約）。高複雜度邊界案例進行選擇性 Gherkin 正式驗證。產出：驗證通過的綠色建置 + 一致性報告。'
    },
    btnLabel: { en: 'Phase 3: Verification', zh: 'Phase 3: 驗證' },
    mermaid: `sequenceDiagram
  participant CI as CI/CD Pipeline
  participant AFL as Auto Feedback<br/>Loop
  participant CC as Consistency<br/>Checker
  participant RPT as Report

  rect rgb(30, 45, 80)
    Note over CI,RPT: Step 1 — Auto Feedback Loop (AI x BDD)
    CI->>AFL: Trigger verification cycle
    AFL->>AFL: Compare test assertions vs implementation
    AFL->>AFL: Detect untested code paths
    AFL->>AFL: Detect tests without matching impl

    alt Inconsistency found
      AFL->>CI: Flag: test-impl mismatch
      CI->>CI: Return to Phase 2 for fix
    else Consistent
      AFL-->>CI: Pass: test-impl aligned
    end
  end

  rect rgb(35, 50, 85)
    Note over CI,RPT: Step 2 — TDD Consistency Check (OpenNet)
    CI->>CC: Load original test contract
    CC->>CC: Diff current tests vs original contract
    CC->>CC: Check: no assertions removed?
    CC->>CC: Check: no test weakened?
    CC->>CC: Check: adapter contracts intact?

    alt Test drift detected
      CC->>RPT: Warning: contract violation
      CC->>CI: Flag for review
    else No drift
      CC-->>CI: Pass: contract integrity verified
    end
  end

  rect rgb(40, 55, 90)
    Note over CI,RPT: Step 3 — Selective Gherkin (High-Complexity Only)
    CI->>CC: Identify high-complexity boundaries
    CC-->>CI: Boundary case list (from Phase 0)

    loop For each high-complexity boundary
      CI->>CC: Generate Gherkin feature file
      CC->>CC: Execute Gherkin scenarios
      CC-->>CI: Scenario results
    end
  end

  rect rgb(45, 60, 95)
    Note over CI,RPT: Step 4 — Report Generation
    CI->>RPT: Compile verification results
    RPT->>RPT: Auto Feedback: PASS
    RPT->>RPT: Consistency Check: PASS
    RPT->>RPT: Gherkin Boundaries: PASS
    RPT-->>CI: Verified green build + report
  end

  Note over CI,RPT: Output: Verified green build + consistency report`
  },
  {
    id: 'phase-4',
    title: {
      en: 'Phase 4 — Tracking & Iteration (OpenNet)',
      zh: 'Phase 4 — 追蹤與迭代（OpenNet）'
    },
    desc: {
      en: '4-layer documentation tracking from OpenNet: Daily Log for progress, Changelog for API/behavior changes, AI Record for LLM decision audit trail, Amendment Log for spec evolution. Together they form a complete audit trail enabling future iterations.',
      zh: 'OpenNet 的 4 層文件追蹤：Daily Log 記錄進度、Changelog 記錄 API/行為變更、AI Record 記錄 LLM 決策審計軌跡、Amendment Log 記錄規格演進。共同構成完整審計軌跡，支援未來迭代。'
    },
    btnLabel: { en: 'Phase 4: Tracking', zh: 'Phase 4: 追蹤' },
    mermaid: `sequenceDiagram
  participant DEV as Developer
  participant TS as Tracking System
  participant CL as Changelog
  participant AIL as AI Audit Log

  rect rgb(30, 45, 80)
    Note over DEV,AIL: Layer 1 — Daily Log
    DEV->>TS: Record daily progress entry
    TS->>TS: Auto-capture: tasks completed
    TS->>TS: Auto-capture: blockers encountered
    TS->>TS: Auto-capture: decisions made
    TS-->>DEV: Daily log persisted
  end

  rect rgb(35, 50, 85)
    Note over DEV,CL: Layer 2 — Changelog
    DEV->>CL: Log API changes
    DEV->>CL: Log behavior changes
    DEV->>CL: Log breaking changes with migration notes

    CL->>CL: Auto-link to test contract diffs
    CL->>CL: Auto-link to affected adapters
    CL-->>DEV: Changelog entry created
  end

  rect rgb(40, 55, 90)
    Note over DEV,AIL: Layer 3 — AI Record (LLM Decision Audit)
    DEV->>AIL: Record LLM-generated code decisions
    AIL->>AIL: Capture: prompt used
    AIL->>AIL: Capture: model + temperature
    AIL->>AIL: Capture: accepted vs rejected suggestions
    AIL->>AIL: Capture: human override rationale

    AIL-->>DEV: AI decision audit trail
  end

  rect rgb(45, 60, 95)
    Note over DEV,AIL: Layer 4 — Amendment Log (Spec Evolution)
    DEV->>TS: Record spec change request
    TS->>TS: Diff: original spec vs amended spec
    TS->>CL: Cross-reference changelog impact
    TS->>AIL: Cross-reference AI decisions affected

    TS-->>DEV: Amendment log with traceability
  end

  rect rgb(50, 65, 100)
    Note over DEV,AIL: Iteration Gate
    DEV->>TS: Review complete audit trail
    TS-->>DEV: Summary: 4-layer tracking complete

    alt New requirements identified
      DEV->>DEV: Return to Phase 0 Discovery
    else Stable release
      DEV->>DEV: Tag version + deploy
    end
  end

  Note over DEV,AIL: Output: Complete audit trail for iteration`
  }
];

// ===== Mermaid Init =====
mermaid.initialize({
  startOnLoad: false,
  theme: 'default',
  securityLevel: 'loose',
  sequence: {
    diagramMarginX: 16,
    diagramMarginY: 16,
    actorMargin: 60,
    width: 180,
    height: 50,
    boxMargin: 8,
    boxTextMargin: 6,
    noteMargin: 12,
    messageMargin: 40,
    mirrorActors: true,
    useMaxWidth: false
  },
  flowchart: {
    useMaxWidth: false,
    htmlLabels: true,
    curve: 'basis'
  }
});

// ===== State =====
let currentIdx = 0;
let renderCounter = 0;

// ===== Sidebar =====
const sidebarEl = document.getElementById('sidebar');

DIAGRAMS.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'sidebar-btn' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `<span class="btn-num">${i + 1}</span><span class="btn-label" data-en="${d.btnLabel.en}" data-zh="${d.btnLabel.zh}">${d.btnLabel[LANG]}</span>`;
  btn.addEventListener('click', () => selectDiagram(i));
  sidebarEl.appendChild(btn);
});

// ===== Rendering =====
const titleEl = document.getElementById('diagram-title');
const descEl = document.getElementById('diagram-desc');
const wrapEl = document.getElementById('mermaid-wrap');

async function selectDiagram(idx) {
  currentIdx = idx;

  // Update sidebar active state
  sidebarEl.querySelectorAll('.sidebar-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  const d = DIAGRAMS[idx];
  titleEl.textContent = d.title[LANG];
  descEl.textContent = d.desc[LANG];

  // Show loading
  wrapEl.innerHTML = `<div class="loading-text">${LANG === 'zh' ? '載入圖表中...' : 'Rendering diagram...'}</div>`;

  // Render mermaid
  try {
    renderCounter++;
    const renderId = 'mermaid-diagram-' + renderCounter;
    const { svg } = await mermaid.render(renderId, d.mermaid);
    // Only update if user hasn't switched to a different diagram
    if (currentIdx === idx) {
      wrapEl.innerHTML = svg;
    }
  } catch (err) {
    console.error('Mermaid render error:', err);
    wrapEl.innerHTML = `<div class="loading-text" style="color:#D32F2F;">Error rendering diagram. Check console for details.</div>`;
  }
}

// ===== Init =====
function init() {
  // Detect embedded mode
  try {
    if (window.self !== window.top) {
      document.body.classList.add('embedded');
    }
  } catch (e) {
    // Cross-origin iframe — treat as embedded
    document.body.classList.add('embedded');
  }

  // Also check for ?embedded query param
  if (new URLSearchParams(window.location.search).has('embedded')) {
    document.body.classList.add('embedded');
  }

  applyLang(LANG);

  // Load first diagram
  selectDiagram(0);
}

init();
</script>
